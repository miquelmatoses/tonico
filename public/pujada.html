<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="pujada.titol"></h1>
    <form id="pujar">
      <p><label><span data-i18n="pujada.data"></span><br>
        <input type="date" name="data" required></label></p>
      <p><label><span data-i18n="pujada.fitxer_senior"></span><br>
        <input type="file" name="senior" accept=".csv"></label></p>
      <p><label><span data-i18n="pujada.fitxer_juvenil"></span><br>
        <input type="file" name="juvenil" accept=".csv"></label></p>
      <p><button type="submit" data-i18n="pujada.enviar"></button></p>
    </form>
    <p role="status" id="estat"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    // Gate: sense equips creats, cap a l'onboarding.
    const { equips } = await api('/api/equips');
    if (equips.length < 2) { location.href = '/onboarding.html'; }
    const form = document.getElementById('pujar');
    const estat = document.getElementById('estat');
    form.querySelector('[name=data]').value = new Date().toISOString().slice(0, 10);
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      estat.textContent = t('comu.carregant');
      const r = await fetch('/api/pujar', { method: 'POST', credentials: 'same-origin', body: new FormData(form) });
      if (r.status === 401) { location.href = '/'; return; }
      const cos = await r.json().catch(() => ({}));
      if (!r.ok) { estat.textContent = t('pujada.error', { detall: cos.detall || cos.error || '' }); return; }
      estat.textContent = cos.resultats.map((x) => t('pujada.exit', x)).join('  ·  ');
    });
  </script>
</body>
</html>
