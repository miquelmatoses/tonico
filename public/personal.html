<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="personal.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');
    const lbl = (k) => (t('element.' + k) === 'element.' + k ? k : t('element.' + k));

    async function pinta() {
      const d = await api('/api/personal');
      main.querySelectorAll('section, p.resum, form').forEach((n) => n.remove());
      estat.remove?.();
      if (d.error) { main.append(el('p', { text: t('pla.sense_pla') })); return; }

      main.append(el('p', { class: 'resum', text: t('personal.fase_actual', { fase: d.fase_actual }) }));

      // Declarar el personal actual
      const form = el('form', {}, el('h2', { text: t('personal.declarat_titol') }));
      const claus = Object.keys(d.esperat.personal || {});
      const inputs = {};
      for (const k of claus) {
        inputs[k] = el('input', { type: 'number', min: '0', size: '3', value: d.declarat[k] ?? 0, 'aria-label': lbl(k) });
        form.append(el('label', {}, lbl(k) + ' ', inputs[k]), ' ');
      }
      const desa = el('button', { type: 'button', text: t('personal.desa') });
      desa.addEventListener('click', async () => {
        for (const k of claus) await api('/api/personal', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ clau: k, valor: Number(inputs[k].value) || 0 }) });
        pinta();
      });
      form.append(desa);
      main.append(form);

      // Desquadres
      const secD = el('section', {}, el('h2', { text: t('personal.desquadres_titol') }));
      if (!d.desquadres.length) secD.append(el('p', { text: t('personal.tot_quadra') }));
      else secD.append(el('ul', {}, ...d.desquadres.map((x) => el('li', { text: t('personal.desquadre', { clau: lbl(x.clau), declarat: x.declarat, esperat: x.esperat }) }))));
      main.append(secD);

      // Checklist de canvi de fase
      const secC = el('section', {}, el('h2', { text: t('personal.checklist_titol') }));
      for (const c of d.checklists) {
        secC.append(el('h3', { text: t('personal.canvi_a', { fase: c.fase }) }));
        const items = [
          ...c.personal.map((x) => t('personal.desquadre', { clau: lbl(x.clau), declarat: x.declarat, esperat: x.esperat })),
          ...c.canvis.map((x) => `${x.nom}${x.cost ? ' — ' + x.cost + '€' : ''}`),
        ];
        secC.append(el('ul', {}, ...items.map((i) => el('li', { text: i }))));
        if (c.cost_total) secC.append(el('p', { text: t('personal.cost_total', { cost: c.cost_total }) }));
      }
      main.append(secC);
    }
    await pinta();
  </script>
</body>
</html>
