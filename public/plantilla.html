<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="plantilla.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');
    const ORDRE = ['entrenable', 'futur_entrenador', 'experiencia', 'nucli_competitiu', 'farciment', 'venda', 'alliberament'];

    const { instantania, jugadors, intercanvis } = await api('/api/plantilla');
    estat.remove();
    if (!instantania) { main.append(el('p', { text: t('plantilla.buit') })); throw 0; }

    main.append(el('p', { text: t('plantilla.instantania', {
      temporada: instantania.temporada, setmana: instantania.setmana_temporada, data: instantania.data }) }));

    // Decisions pendents (regla d'or)
    if (intercanvis.length) {
      const sec = el('section', {}, el('h2', { text: t('plantilla.intercanvis_titol') }));
      for (const x of intercanvis) {
        const clau = x.entrant ? 'plantilla.intercanvi' : 'plantilla.intercanvi_solitari';
        const p = el('p', {}, el('span', { text: t(clau, {
          entrant: x.entrant || '', eixent: x.eixent, categoria: t('categoria.' + x.categoria),
          diferencia: x.diferencia != null ? x.diferencia.toFixed(1) : '', desti: t('categoria.' + x.desti_eixent) }) + ' ' }));
        for (const [accio, clauB] of [['acceptar', 'plantilla.acceptar'], ['rebutjar', 'plantilla.rebutjar']]) {
          const b = el('button', { type: 'button', text: t('plantilla.' + accio) });
          b.addEventListener('click', async () => {
            await api('/api/intercanvis', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id: x.id, accio }) });
            location.reload();
          });
          p.append(' ', b);
        }
        sec.append(p);
      }
      main.append(sec);
    }

    // Plantilla per categoria
    const hab = (j) => `PO${j.porteria} DF${j.defensa} CR${j.creativitat} EX${j.extrem} PA${j.passades} AN${j.anotacio} PP${j.pilota_aturada}`;
    const cellaFornada = (j, categoria) => {
      if (categoria !== 'entrenable') return el('td', { text: j.fornada || '' });   // doctrina: només entrenables
      const inp = el('input', { type: 'text', size: '3', value: j.fornada || '', 'aria-label': t('plantilla.col_fornada') });
      inp.addEventListener('change', () => api('/api/fornada', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ jugador_id: j.id, lletra: inp.value.trim() }) }).catch(() => {}));
      return el('td', {}, inp);
    };
    for (const c of ORDRE) {
      const grup = jugadors.filter((j) => j.categoria === c);
      if (!grup.length) continue;
      const cols = ['col_jugador', 'col_posicio', 'col_edat', 'col_habilitats', 'col_puntuacio', 'col_fornada'];
      const thead = el('thead', {}, el('tr', {}, ...cols.map((k) => el('th', { text: t('plantilla.' + k) }))));
      const tbody = el('tbody', {}, ...grup.map((j) => el('tr', {},
        el('td', {}, el('a', { href: `/jugador.html?id=${j.id}`, text: j.nom }),
          j.origen === 'manual' ? ` ${t('plantilla.manual')}` : ''),
        el('td', { text: j.posicio || '' }),
        el('td', { text: `${j.edat_anys}a ${j.edat_dies}d` }),
        el('td', { text: hab(j) }),
        el('td', { text: j.puntuacio != null ? j.puntuacio.toFixed(1) : '' }),
        cellaFornada(j, c),
      )));
      main.append(el('section', {}, el('h2', { text: `${t('categoria.' + c)} (${grup.length})` }), el('table', {}, thead, tbody)));
    }
  </script>
</body>
</html>
