<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="esta_setmana.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');

    async function regenera() {
      await api('/api/alertes', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ accio: 'regenerar' }) });
      pinta();
    }
    function botoRegenera() {
      const b = el('button', { type: 'button', class: 'regen', text: t('esta_setmana.regenera') });
      b.addEventListener('click', regenera);
      return b;
    }

    const opc = async (p) => { try { return await p; } catch { return null; } };

    async function pinta() {
      const { alertes, revisat, instantania } = await api('/api/alertes');
      main.querySelectorAll('section, p.paco, ul, button.regen, p.enllac').forEach((n) => n.remove());
      estat.remove?.();

      // Sense instantània: encara no hi ha dades
      if (!instantania) {
        main.append(el('p', { class: 'paco', text: t('esta_setmana.sense_dades') }),
          el('p', { class: 'enllac' }, el('a', { href: '/pujada.html', text: t('esta_setmana.a_pujar') })));
        return;
      }

      // Estat del pla (integració transversal)
      const pla = await opc(api('/api/pla'));
      if (pla && !pla.error && pla.temporadaActual != null) {
        main.append(el('p', { class: 'paco', text: t('esta_setmana.estat_pla', { temporada: pla.temporadaActual, fase: pla.fase_actual }) }));
      }
      // Base sempre declarada
      main.append(el('p', { class: 'paco', text: t('esta_setmana.base', { data: instantania.data }) }));

      // Resum d'alineació (integració transversal)
      const ali = await opc(api('/api/alineacio', { method: 'POST', headers: { 'content-type': 'application/json' }, body: '{}' }));
      const resumAli = () => {
        if (!ali || ali.error || !ali.comptabilitat) return [];
        const ent = ali.comptabilitat.filter((c) => c.categoria === 'entrenable');
        const entrenen = ent.filter((c) => c.total >= 100).length;
        return [el('p', { class: 'paco', text: t('esta_setmana.alineacio_resum', { entrenen, total: ent.length }) }),
          el('p', { class: 'enllac' }, el('a', { href: '/alineacio.html', text: t('esta_setmana.veure_alineacio') }))];
      };

      // Encara no s'ha passat revista contra la instantània vigent
      if (!revisat) {
        main.append(el('p', { class: 'paco', text: t('esta_setmana.no_revisat') }), botoRegenera());
        return;
      }
      // Setmana tranquil·la: Paco sap callar
      if (!alertes.length) {
        main.append(el('p', { class: 'paco', text: t('esta_setmana.tot_be') }), ...resumAli(),
          el('p', { class: 'paco', text: t('esta_setmana.firma') }), botoRegenera());
        return;
      }
      // Hi ha foc: informe ordenat per urgència
      main.append(el('p', { class: 'paco', text: t('esta_setmana.salutacio') }));
      const ul = el('ul');
      for (const a of alertes) {
        const li = el('li', {}, el('span', { text: t(a.missatge_clau, a.parametres) + ' ' }));
        for (const [estatNou, clau] of [['vista', 'esta_setmana.vista'], ['ignorada', 'esta_setmana.ignora']]) {
          const b = el('button', { type: 'button', text: t(clau) });
          b.addEventListener('click', async () => {
            await api('/api/alertes', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id: a.id, estat: estatNou }) });
            pinta();
          });
          li.append(' ', b);
        }
        ul.append(li);
      }
      main.append(ul, ...resumAli(), el('p', { class: 'paco', text: t('esta_setmana.firma') }), botoRegenera());
    }
    await pinta();
  </script>
</body>
</html>
