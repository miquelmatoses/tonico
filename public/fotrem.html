<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="fotrem.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');
    const SIGLA = { porteria: 'PO', defensa: 'DF', creativitat: 'CR', extrem: 'EX', passades: 'PA', anotacio: 'AN', pilota_aturada: 'PP' };
    const ESTATS = ['seguiment', 'elegit', 'cua_eixida'];
    const val = (v) => (v == null ? '-' : v === 'desconegut' ? t('fotrem.desconegut') : v);

    const { juvenils } = await api('/api/fotrem');
    estat.remove();
    if (!juvenils.length) { main.append(el('p', { text: t('fotrem.buit') })); throw 0; }

    const hab = (j) => j.habilitats.filter((h) => h.actual != null || h.potencial != null)
      .map((h) => `${SIGLA[h.habilitat]} ${val(h.actual)}/${val(h.potencial)}`).join('  ');

    // Sense columna «crida»: l'avaluador de crides és per a OFERTES NOVES, no per als de casa.
    const cols = ['col_jugador', 'col_edat', 'col_habilitats', 'col_potencial', 'col_promocio', 'col_aterratge', 'col_estat'];
    const thead = el('thead', {}, el('tr', {}, ...cols.map((k) => el('th', { text: t('fotrem.' + k) }))));
    const tbody = el('tbody', {}, ...juvenils.map((j) => {
      const sel = el('select', {}, ...ESTATS.map((e) => {
        const o = el('option', { value: e, text: t('fotrem.estat_' + e) });
        if (e === j.estat) o.setAttribute('selected', '');
        return o;
      }));
      sel.addEventListener('change', () => api('/api/fotrem', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ jugador_id: j.jugador_id, estat: sel.value }) }).catch(() => {}));
      return el('tr', {},
        el('td', { text: j.nom }),
        el('td', { text: `${j.edat_anys}a ${j.edat_dies}d` }),
        el('td', { text: hab(j) }),
        el('td', { text: j.potencial_max ?? '—' }),
        el('td', { text: j.dies_restants_promocio != null ? t('fotrem.dies', { dies: j.dies_restants_promocio }) : '—' }),
        el('td', { text: j.aterratge ? t('fotrem.aterratge_val', j.aterratge) : '—' }),
        el('td', {}, sel));
    }));
    main.append(el('table', {}, thead, tbody));
  </script>
</body>
</html>
