<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="mercat.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');

    function textFiltre(f) {
      if (f.rol === 'entrenable') return t('mercat.filtre_entrenable', { bucket: f.bucket, posicions: (f.posicions || []).join('/'), edat_max: f.edat_max, creativitat_min: f.creativitat_min, pressupost: f.pressupost, falten: f.falten });
      const hab = f.habilitat ? `${f.habilitat.camp} ${f.habilitat.op} ${f.habilitat.valor}` : '';
      return t('mercat.filtre_farciment', { bucket: f.bucket, posicions: (f.posicions || []).join('/'), habilitat: hab, pressupost: f.pressupost, falten: f.falten });
    }

    async function pinta() {
      const { filtres, preus } = await api('/api/mercat');
      main.querySelectorAll('section, form').forEach((n) => n.remove());
      estat.remove?.();

      // Filtres de cerca
      const secF = el('section', {}, el('h2', { text: t('mercat.filtres_titol') }));
      const utils = filtres.filter((f) => f.falten > 0);
      if (!utils.length) secF.append(el('p', { text: t('mercat.sense_filtres') }));
      else secF.append(el('ul', {}, ...utils.map((f) => el('li', { text: textFiltre(f) }))));
      main.append(secF);

      // Formulari de comparable
      const form = el('form', {});
      const pos = el('input', { type: 'text', name: 'posicio', size: '4', 'aria-label': t('mercat.posicio') });
      const edat = el('input', { type: 'number', name: 'edat', size: '3', 'aria-label': t('mercat.edat') });
      const hab = el('input', { type: 'number', name: 'habilitat', size: '3', 'aria-label': t('mercat.habilitat') });
      const preu = el('input', { type: 'number', name: 'preu', required: 'true', 'aria-label': t('mercat.preu') });
      const nota = el('input', { type: 'text', name: 'nota', 'aria-label': t('mercat.nota') });
      form.append(el('h2', { text: t('mercat.nou_titol') }), pos, ' ', edat, ' ', hab, ' ', preu, ' ', nota, ' ',
        el('button', { type: 'submit', text: t('mercat.afig') }));
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        await api('/api/mercat', { method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ posicio: pos.value, edat: edat.value ? Number(edat.value) : null, habilitat: hab.value ? Number(hab.value) : null, preu: Number(preu.value), nota: nota.value }) });
        pinta();
      });
      main.append(form);

      // Preus observats
      const sec = el('section', {}, el('h2', { text: t('mercat.preus_titol') }));
      if (!preus.length) sec.append(el('p', { text: t('mercat.buit') }));
      else {
        const cols = ['col_posicio', 'col_edat', 'col_habilitat', 'col_preu', 'col_data', 'col_nota'];
        sec.append(el('table', {}, el('thead', {}, el('tr', {}, ...cols.map((k) => el('th', { text: t('mercat.' + k) })), el('th', {}))),
          el('tbody', {}, ...preus.map((p) => {
            const esb = el('button', { type: 'button', text: t('mercat.esborra') });
            esb.addEventListener('click', async () => { await api('/api/mercat', { method: 'DELETE', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ id: p.id }) }); pinta(); });
            return el('tr', {}, el('td', { text: p.posicio || '' }), el('td', { text: p.edat ?? '' }), el('td', { text: p.habilitat ?? '' }), el('td', { text: p.preu }), el('td', { text: p.data }), el('td', { text: p.nota || '' }), el('td', {}, esb));
          }))));
      }
      main.append(sec);
    }
    await pinta();
  </script>
</body>
</html>
