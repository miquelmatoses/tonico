<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <nav></nav>
  <main>
    <h1 data-i18n="comparador.titol"></h1>
    <p role="status" id="estat" data-i18n="comu.carregant"></p>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, pintaNav, api, el, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    pintaNav();
    const main = document.querySelector('main');
    const estat = document.getElementById('estat');
    const SIGLA = { porteria: 'PO', defensa: 'DF', creativitat: 'CR', extrem: 'EX', passades: 'PA', anotacio: 'AN', pilota_aturada: 'PP' };

    async function pinta(a, b) {
      const q = a && b ? `?a=${a}&b=${b}` : '';
      const d = await api('/api/comparador' + q);
      main.querySelectorAll('section, p.resum, form').forEach((n) => n.remove());
      estat.remove?.();
      if (!d.comparable) { main.append(el('p', { class: 'resum', text: t('comparador.sense') })); return; }

      // Selector manual (el camí per defecte ja ve pintat; això és opcional)
      const sel = (nom, triat) => {
        const s = el('select', { name: nom });
        for (const i of d.instantanies) {
          const o = el('option', { value: i.id, text: `${i.data} (T${i.temporada} s${i.setmana_temporada})` });
          if (i.id === triat) o.setAttribute('selected', '');
          s.append(o);
        }
        return s;
      };
      const form = el('form', {}, sel('a', d.a.id), document.createTextNode(' → '), sel('b', d.b.id));
      form.addEventListener('change', () => pinta(form.a.value, form.b.value));
      main.append(form);

      const resum = `${t('comparador.parella', { b: d.b.data, a: d.a.data, dies: d.dies })}` +
        (d.canvi_temporada ? ` (${t('comparador.canvi_temporada')})` : '') +
        (d.pops_per_setmana != null ? ` · ${t('comparador.velocitat', { n: d.pops_per_setmana })}` : '');
      main.append(el('p', { class: 'resum', text: resum }));

      // Pops
      const secP = el('section', {}, el('h2', { text: t('comparador.pops_titol') }));
      if (d.pops.length) {
        secP.append(el('table', {},
          el('thead', {}, el('tr', {}, el('th', { text: t('comparador.col_jugador') }), el('th', { text: t('comparador.col_pops') }))),
          el('tbody', {}, ...d.pops.map((p) => el('tr', {},
            el('td', { text: p.nom }), el('td', { text: p.habilitats.map((h) => SIGLA[h]).join(' ') }))))));
      } else secP.append(el('p', { text: t('comparador.cap_pop') }));
      main.append(secP);

      // TSI / sou (ordenat per delta de TSI)
      const cols = ['col_jugador', 'col_tsi', 'col_sou'];
      const files = d.tsi_sou.filter((r) => r.delta_tsi || r.delta_sou).sort((x, y) => y.delta_tsi - x.delta_tsi);
      const secT = el('section', {}, el('h2', { text: t('comparador.tsi_titol') }),
        el('table', {},
          el('thead', {}, el('tr', {}, ...cols.map((k) => el('th', { text: t('comparador.' + k) })))),
          el('tbody', {}, ...files.map((r) => el('tr', {},
            el('td', { text: r.nom }),
            el('td', { text: `${r.tsi_b} (${signe(r.delta_tsi)})` }),
            el('td', { text: `${r.sou_b} (${signe(r.delta_sou)})` }))))));
      main.append(secT);

      if (d.nous.length) main.append(el('p', { class: 'resum', text: `${t('comparador.nous')}: ${d.nous.join(', ')}` }));
      if (d.desapareguts.length) main.append(el('p', { class: 'resum', text: `${t('comparador.desapareguts')}: ${d.desapareguts.join(', ')}` }));
    }
    const signe = (n) => (n > 0 ? `+${n}` : `${n}`);
    await pinta();
  </script>
</body>
</html>
