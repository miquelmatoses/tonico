<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/estil.css">
  <title>Tonico</title>
</head>
<body>
  <main>
    <header>
      <h1 data-i18n="app.nom"></h1>
      <p data-i18n="app.descriptor"></p>
    </header>
    <section>
      <h2 data-i18n="login.titol"></h2>
      <form id="entrar">
        <p><label><span data-i18n="login.correu"></span><br>
          <input type="email" name="correu" autocomplete="username" required></label></p>
        <p><label><span data-i18n="login.contrasenya"></span><br>
          <input type="password" name="contrasenya" autocomplete="current-password" required></label></p>
        <p><button type="submit" data-i18n="login.entrar"></button></p>
        <p role="alert" id="error" hidden></p>
      </form>
      <p><a href="/registre.html" data-i18n="login.cap_registre"></a></p>
    </section>
  </main>
  <script type="module">
    import { carregaI18n, aplicaI18n, t } from '/comu.js';
    await carregaI18n();
    aplicaI18n();
    const form = document.getElementById('entrar');
    const err = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.hidden = true;
      const cos = Object.fromEntries(new FormData(form));
      const r = await fetch('/api/entrar', {
        method: 'POST', credentials: 'same-origin',
        headers: { 'content-type': 'application/json' }, body: JSON.stringify(cos),
      });
      if (r.ok) { location.href = '/esta-setmana.html'; return; }
      err.textContent = t('login.error');
      err.hidden = false;
    });
  </script>
</body>
</html>
